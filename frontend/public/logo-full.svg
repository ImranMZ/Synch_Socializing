<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B2FF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3B6E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="reverseGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3B6E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2FF7;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="shakeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#FFE0EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3B6E;stop-opacity:0.6" />
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(250, 80)">
    <g transform="scale(1.2)">
      <g>
        <ellipse cx="-28" cy="-36" rx="20" ry="18" fill="url(#mainGrad)" opacity="0.95"/>
        <path d="M-45,-36 L-58,-28 L-42,-24Z" fill="#7B2FF7" opacity="0.95"/>
        <ellipse cx="-28" cy="4" rx="24" ry="28" fill="url(#mainGrad)" opacity="0.85"/>
        <path d="M-8,4 Q0,12 8,6" fill="none" stroke="url(#mainGrad)" stroke-width="11" stroke-linecap="round" opacity="0.92"/>
      </g>
      <g>
        <ellipse cx="28" cy="-36" rx="20" ry="18" fill="url(#reverseGrad)" opacity="0.95"/>
        <path d="M45,-36 L58,-28 L42,-24Z" fill="#FF3B6E" opacity="0.95"/>
        <ellipse cx="28" cy="4" rx="24" ry="28" fill="url(#reverseGrad)" opacity="0.85"/>
        <path d="M8,4 Q0,12 -8,6" fill="none" stroke="url(#reverseGrad)" stroke-width="11" stroke-linecap="round" opacity="0.92"/>
      </g>
      <g filter="url(#glow)">
        <path d="M-9,3 C-7,-1 -3,-6 0,-4 C3,-6 7,-3 9,0 C10,3 7,7 4,9 C1,10 -1,10 -4,9 C-7,7 -10,6 -9,3Z" fill="url(#shakeGlow)" opacity="0.9"/>
        <circle cx="0" cy="2" r="4" fill="#FFFFFF" opacity="1"/>
      </g>
    </g>
    <text y="110" font-family="Arial, sans-serif" font-size="52" font-weight="900" letter-spacing="-1" text-anchor="middle">
      <tspan fill="#FFFFFF">S</tspan><tspan fill="#FFFFFF">y</tspan><tspan fill="#FFFFFF">n</tspan><tspan fill="#FFFFFF">c</tspan><tspan fill="url(#mainGrad)">h</tspan>
    </text>
    <text y="150" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#777777" letter-spacing="8" text-anchor="middle">CONNECT IN PERFECT SYNC</text>
    <line x1="-100" y1="170" x2="100" y2="170" stroke="url(#mainGrad)" stroke-width="1" opacity="0.3"/>
    <text y="195" font-family="Arial, sans-serif" font-size="10" font-weight="300" fill="#555555" letter-spacing="6" text-anchor="middle">SOCIALIZING REDEFINED</text>
  </g>
</svg>
