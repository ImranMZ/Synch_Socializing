<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding - Synch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: Inter, sans-serif; background: #fcf8fa; margin: 0; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        const API = 'http://127.0.0.1:8001';

        const vibes = ['Techie', 'GymBro', 'Gamer', 'Foodie', 'Bookworm', 'Traveler', 'Artist', 'Fashionista', 'Entrepreneur'];
        const hobbiesList = ['Coding', 'Gaming', 'Reading', 'Traveling', 'Cooking', 'Photography', 'Music', 'Fitness', 'Writing', 'Dancing', 'Anime', 'Cars', 'Coffee', 'Binge Watch', 'Chai'];

        function App() {
            const [step, setStep] = useState('goal');
            const [profile, setProfile] = useState({});
            const [hobbies, setHobbies] = useState([]);
            const [quizQuestions, setQuizQuestions] = useState([]);
            const [quizAnswers, setQuizAnswers] = useState({});
            const [matches, setMatches] = useState([]);
            const [loading, setLoading] = useState(false);

            const handleGoal = (goal) => { setProfile({...profile, Goal: goal}); setStep('gender'); };
            const handleGender = (gender) => { setProfile({...profile, Gender: gender}); setStep('vibe'); };
            const handleVibe = (vibe) => { setProfile({...profile, Vibe: vibe}); setStep('hobbies'); };
            const toggleHobby = (h) => { setHobbies(prev => prev.includes(h) ? prev.filter(x => x !== h) : [...prev, h]); };
            const handleHobbiesNext = () => { setProfile({...profile, Hobbies: hobbies.join(', ')}; setStep('lifestyle'); };
            
            const handleLifestyle = () => {
                setLoading(true);
                fetch(`${API}/api/quiz/questions`).then(r => r.json()).then(q => {
                    setQuizQuestions(q.questions || []);
                    setStep('quiz');
                    setLoading(false);
                });
            };

            const handleQuizAnswer = (qId, answer) => { setQuizAnswers({...quizAnswers, [qId]: answer}); };
            
            const handleQuizSubmit = async () => {
                setLoading(true);
                const answers = Object.entries(quizAnswers).map(([qId, answer]) => ({ question_id: qId, answer }));
                await fetch(`${API}/api/quiz/submit`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ profile, quiz_answers: answers })
                });
                const res = await fetch(`${API}/api/match`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(profile)
                });
                const data = await res.json();
                setMatches(data);
                setStep('matches');
                setLoading(false);
            };

            if (step === 'matches') {
                return React.createElement('div', { className: 'min-h-screen bg-[#fcf8fa] p-6' },
                    React.createElement('div', { className: 'max-w-6xl mx-auto' },
                        React.createElement('h2', { className: 'text-3xl font-bold mb-6 text-center' }, 'Your Matches'),
                        React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
                            matches.map((m, i) => 
                                React.createElement('div', { key: i, className: 'bg-white p-6 rounded-2xl shadow-sm' },
                                    React.createElement('div', { className: 'flex justify-between items-start mb-4' },
                                        React.createElement('div', null,
                                            React.createElement('h3', { className: 'font-bold text-lg' }, m.Name),
                                            React.createElement('p', { className: 'text-sm text-gray-500' }, `${m.Vibe} • ${m.Age} • ${m.Location}`)
                                        ),
                                        React.createElement('span', { className: 'bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-bold' }, `${m.Compatibility_Score}%`)
                                    ),
                                    React.createElement('p', { className: 'text-sm text-gray-600 mb-2' }, `${m.Profession} • ${m.Education}`),
                                    React.createElement('p', { className: 'text-sm text-gray-500 mb-4' }, m.Hobbies),
                                    React.createElement('button', {
                                        onClick: () => window.location.href = `/chat.html?name=${encodeURIComponent(m.Name)}`,
                                        className: 'w-full p-3 bg-black text-white rounded-xl font-semibold'
                                    }, 'Start Chat')
                                )
                            )
                        )
                    )
                );
            }

            return React.createElement('div', { className: 'min-h-screen bg-[#fcf8fa] p-6' },
                React.createElement('div', { className: 'max-w-2xl mx-auto' },
                    step === 'goal' && React.createElement('div', { className: 'text-center' },
                        React.createElement('h2', { className: 'text-3xl font-bold mb-8' }, 'What are you looking for?'),
                        React.createElement('div', { className: 'space-y-4' },
                            ['Partner', 'Friends', 'Both'].map(g => 
                                React.createElement('button', {
                                    key: g, onClick: () => handleGoal(g),
                                    className: 'block w-full p-4 bg-white rounded-xl hover:bg-gray-50 border-2 border-transparent hover:border-black transition'
                                }, g)
                            )
                        )
                    ),
                    step === 'gender' && React.createElement('div', { className: 'text-center' },
                        React.createElement('h2', { className: 'text-3xl font-bold mb-8' }, 'Your gender?'),
                        React.createElement('div', { className: 'space-y-4' },
                            ['Male', 'Female'].map(g => 
                                React.createElement('button', {
                                    key: g, onClick: () => handleGender(g),
                                    className: 'block w-full p-4 bg-white rounded-xl hover:bg-gray-50 border-2 border-transparent hover:border-black transition'
                                }, g)
                            )
                        )
                    ),
                    step === 'vibe' && React.createElement('div', null,
                        React.createElement('h2', { className: 'text-3xl font-bold mb-8 text-center' }, 'Select your vibe'),
                        React.createElement('div', { className: 'grid grid-cols-3 gap-3' },
                            vibes.map(v => 
                                React.createElement('button', {
                                    key: v, onClick: () => handleVibe(v),
                                    className: 'p-4 bg-white rounded-xl hover:bg-gray-50 border-2 border-transparent hover:border-black transition text-sm'
                                }, v)
                            )
                        )
                    ),
                    step === 'hobbies' && React.createElement('div', null,
                        React.createElement('h2', { className: 'text-3xl font-bold mb-8 text-center' }, 'Pick your hobbies'),
                        React.createElement('div', { className: 'grid grid-cols-4 gap-2 mb-6' },
                            hobbiesList.map(h => 
                                React.createElement('button', {
                                    key: h, onClick: () => toggleHobby(h),
                                    className: `p-2 rounded-lg text-sm border-2 transition ${hobbies.includes(h) ? 'bg-black text-white border-black' : 'bg-white border-gray-200 hover:border-black'}`
                                }, h)
                            )
                        ),
                        React.createElement('button', { onClick: handleHobbiesNext, disabled: hobbies.length === 0, className: 'w-full p-4 bg-black text-white rounded-xl font-semibold disabled:bg-gray-300' }, 'Continue')
                    ),
                    step === 'lifestyle' && React.createElement('div', null,
                        React.createElement('h2', { className: 'text-3xl font-bold mb-8 text-center' }, 'Lifestyle preferences'),
                        React.createElement('div', { className: 'space-y-4 bg-white p-6 rounded-2xl' },
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-sm font-semibold mb-2' }, 'City'),
                                React.createElement('select', { 
                                    onChange: e => setProfile({...profile, City: e.target.value}), 
                                    className: 'w-full p-3 border rounded-lg' 
                                },
                                    ['Lahore', 'Karachi', 'Islamabad', 'Rawalpindi'].map(c => React.createElement('option', { key: c }, c))
                                )
                            ),
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-sm font-semibold mb-2' }, 'Smoking'),
                                React.createElement('select', { 
                                    onChange: e => setProfile({...profile, Smoking: e.target.value}), 
                                    className: 'w-full p-3 border rounded-lg' 
                                },
                                    ['No', 'Yes', 'Occasionally'].map(c => React.createElement('option', { key: c }, c))
                                )
                            ),
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-sm font-semibold mb-2' }, 'Diet'),
                                React.createElement('select', { 
                                    onChange: e => setProfile({...profile, Diet: e.target.value}), 
                                    className: 'w-full p-3 border rounded-lg' 
                                },
                                    ['Anything', 'Zabiha Halal Only', 'Vegetarian'].map(c => React.createElement('option', { key: c }, c))
                                )
                            ),
                            React.createElement('button', { 
                                onClick: handleLifestyle, disabled: loading, 
                                className: 'w-full p-4 bg-black text-white rounded-xl font-semibold mt-4 disabled:bg-gray-300' 
                            }, loading ? 'Loading...' : 'Continue to Quiz')
                        )
                    ),
                    step === 'quiz' && React.createElement('div', null,
                        React.createElement('h2', { className: 'text-3xl font-bold mb-8 text-center' }, 'Quick Quiz'),
                        React.createElement('div', { className: 'space-y-6' },
                            quizQuestions.map((q) => 
                                React.createElement('div', { key: q.id, className: 'bg-white p-6 rounded-2xl' },
                                    React.createElement('p', { className: 'font-semibold mb-4' }, q.question),
                                    React.createElement('div', { className: 'space-y-2' },
                                        q.options.map(opt => 
                                            React.createElement('button', {
                                                key: opt.id, onClick: () => handleQuizAnswer(q.id, opt.id),
                                                className: `block w-full p-3 text-left rounded-lg border-2 transition ${quizAnswers[q.id] === opt.id ? 'bg-black text-white border-black' : 'bg-gray-50 border-gray-200 hover:border-black'}`
                                            }, opt.text)
                                        )
                                    )
                                )
                            )
                        ),
                        React.createElement('button', { 
                            onClick: handleQuizSubmit, disabled: loading || Object.keys(quizAnswers).length < 5, 
                            className: 'w-full p-4 bg-black text-white rounded-xl font-semibold mt-4 disabled:bg-gray-300' 
                        }, loading ? 'Finding Matches...' : 'Find My Matches')
                    )
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
