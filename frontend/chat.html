<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Synch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: Inter, sans-serif; background: #fcf8fa; margin: 0; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        const API = 'http://127.0.0.1:8001';

        function App() {
            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('name') || 'Match';
            
            const [matchData, setMatchData] = useState({ Name: name, City: 'Lahore', Vibe: 'Techie' });
            const [chatHistory, setChatHistory] = useState([]);
            const [message, setMessage] = useState('');

            const sendMessage = async () => {
                if (!message.trim()) return;
                const newHistory = [...chatHistory, { role: 'user', content: message }];
                setChatHistory(newHistory);
                setMessage('');

                try {
                    const res = await fetch(`${API}/api/chat/direct`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            match_data: matchData,
                            chat_history: newHistory.map((msg, i) => ({ role: msg.role, content: msg.content }))
                        })
                    });
                    const data = await res.json();
                    setChatHistory([...newHistory, { role: 'assistant', content: data.response }]);
                } catch (e) {
                    console.error('Chat error:', e);
                }
            };

            return React.createElement('div', { className: 'min-h-screen bg-[#fcf8fa] p-6' },
                React.createElement('div', { className: 'max-w-2xl mx-auto bg-white rounded-2xl shadow-sm h-[80vh] flex flex-col' },
                    React.createElement('div', { className: 'p-4 border-b' },
                        React.createElement('h2', { className: 'font-bold' }, name)
                    ),
                    React.createElement('div', { className: 'flex-1 overflow-y-auto p-4 space-y-4' },
                        chatHistory.map((msg, i) => 
                            React.createElement('div', { key: i, className: `flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}` },
                                React.createElement('div', { 
                                    className: `max-w-[70%] p-3 rounded-2xl ${msg.role === 'user' ? 'bg-black text-white' : 'bg-gray-100'}`
                                }, msg.content)
                            )
                        )
                    ),
                    React.createElement('div', { className: 'p-4 border-t flex gap-2' },
                        React.createElement('input', {
                            value: message,
                            onChange: e => setMessage(e.target.value),
                            onKeyPress: e => e.key === 'Enter' && sendMessage(),
                            className: 'flex-1 p-3 border rounded-full',
                            placeholder: 'Type a message...'
                        }),
                        React.createElement('button', { 
                            onClick: sendMessage,
                            className: 'bg-black text-white px-6 rounded-full'
                        }, 'Send')
                    )
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
